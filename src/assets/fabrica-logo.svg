<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- White rounded background -->
  <rect width="512" height="512" rx="96" fill="#FFFFFF" />
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="#E8F0FB" stroke-width="2" />

  <!-- Factory building icon -->
  <g transform="translate(256, 270)">
    <!-- Main body -->
    <rect x="-72" y="-36" width="144" height="108" rx="6" fill="#E8F0FB" />
    <rect x="-72" y="-36" width="144" height="108" rx="6" fill="none" stroke="#2B5BAD" stroke-width="5" />

    <!-- Roof -->
    <polygon points="0,-76 -84,-36 84,-36" fill="#2B5BAD" stroke="#2B5BAD" stroke-width="4" stroke-linejoin="round" />

    <!-- Chimney -->
    <rect x="36" y="-76" width="18" height="40" rx="3" fill="#2B5BAD" />
    <rect x="32" y="-82" width="26" height="8" rx="2" fill="#1A3F7C" />

    <!-- Smoke puffs -->
    <circle cx="45" cy="-98" r="10" fill="#E8F0FB" />
    <circle cx="54" cy="-112" r="8" fill="#E8F0FB" />
    <circle cx="48" cy="-126" r="6" fill="#E8F0FB" />

    <!-- Windows row 1 -->
    <rect x="-52" y="-14" width="24" height="26" rx="4" fill="#2B5BAD" />
    <rect x="-16" y="-14" width="24" height="26" rx="4" fill="#2B5BAD" />
    <rect x="20" y="-14" width="24" height="26" rx="4" fill="#2B5BAD" />

    <!-- Windows row 2 -->
    <rect x="-52" y="22" width="24" height="26" rx="4" fill="#2B5BAD" />
    <rect x="-16" y="22" width="24" height="26" rx="4" fill="#2B5BAD" />
    <rect x="20" y="22" width="24" height="26" rx="4" fill="#2B5BAD" />

    <!-- Door -->
    <rect x="-18" y="52" width="36" height="42" rx="18" fill="#1A3F7C" />
    <circle cx="2" cy="78" r="4" fill="#FFFFFF" />
  </g>
</svg>
